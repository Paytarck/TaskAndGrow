<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task & Grow</title>
    <link rel="stylesheet" href="splash-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="splash-wrapper">
        <div class="splash-content">
            <!-- App Logo -->
            <img src="app-logo.png" alt="Logo" class="splash-logo">
            
            <!-- App Name with Typing Animation -->
            <h1 class="splash-name">Task & Grow</h1>
        </div>
    </div>

    <script type="module">
        // Wait for 4 seconds total, then redirect to index.html
        setTimeout(() => {
            window.location.href = 'mainPage.html';
        }, 4000);
    </script>
</body>
</html>
