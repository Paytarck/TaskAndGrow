<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Yearly Vision · Task & Grow</title>
    <link rel="stylesheet" href="yearly.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ── Top Header ── -->
    <header class="top-header">
        <div class="header-center">
            <span class="page-title">Yearly Vision</span>
            <span class="page-date" id="current-year-display"></span>
        </div>
        <div class="header-right">
            <div id="sync-status-indicator" style="width: 10px; height: 10px; border-radius: 50%; background-color: #94a3b8; display: inline-block; margin-right: 10px;" title="Sync Status"></div>
            <div class="header-stats">
                <span class="stat-badge done" id="global-done">0</span>
                <span class="stat-sep">/</span>
                <span class="stat-badge total" id="global-total">0</span>
            </div>
        </div>
    </header>

    <!-- ── Main Content ── -->
    <main class="main-content">

        <!-- Hero Banner -->
        <div class="hero-banner">
            <p class="hero-greeting">⭐ Vision Board</p>
            <h1 class="hero-heading">LONG-TERM<br><span class="hero-accent">PLANNING.</span></h1>
            <p class="hero-sub">Organize your milestones across the year. Every small step counts.</p>
            
            <div class="progress-wrap">
                <div class="progress-label">
                    <span>Yearly Completion</span>
                    <span id="global-progress-label">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="global-progress-fill"></div>
                </div>
            </div>
        </div>

        <p class="section-label">Annual Roadmap</p>
        <div class="months-grid" id="months-grid">
            <!-- Generated by JS -->
        </div>

    </main>

    <!-- ── Bottom Navigation ── -->
    <nav class="bottom-nav">
        <a href="mainPage.html" class="nav-item">
            <span class="nav-icon nav-icon-svg">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H15v-5h-6v5H4a1 1 0 0 1-1-1V9.5z"/>
                </svg>
            </span>
            <span class="nav-label">Home</span>
        </a>
        <button class="nav-item" onclick="refreshPage()">
            <span class="nav-icon nav-icon-svg">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
            </span>
            <span class="nav-label">Refresh</span>
        </button>
        <a href="yearly-settings.html" class="nav-item" title="Settings">
            <span class="nav-icon nav-icon-svg">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </span>
            <span class="nav-label">Settings</span>
        </a>
    </nav>

    <script type="module">
    import { auth } from './firebase-config.js';
    import { SyncManager } from './sync-manager.js';

    // Fix for sync indicator and initials
    SyncManager.initHeader(auth);

    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const yearlyData = JSON.parse(localStorage.getItem('taskflow_yearly_data')) || {};
        
        function init() {
            // Set Current Year
            document.getElementById('current-year-display').textContent = new Date().getFullYear();
            renderYearly();
        }

        function renderYearly() {
            const grid = document.getElementById('months-grid');
            grid.innerHTML = '';

            let totalTasks = 0;
            let totalDone = 0;

            months.forEach((month, index) => {
                const monthTasks = yearlyData[index] || [];
                const done = monthTasks.filter(t => t.completed).length;
                const total = monthTasks.length;
                const pct = total === 0 ? 0 : Math.round((done / total) * 100);
                
                totalTasks += total;
                totalDone += done;

                const isCompleted = total > 0 && done === total;

                const card = document.createElement('a');
                card.href = `yearly-month.html?m=${index}`;
                card.className = `month-card ${isCompleted ? 'fully-completed' : ''}`;
                
                card.innerHTML = `
                    <div class="month-header">
                        <span class="month-name">${month}</span>
                        ${isCompleted ? '<span class="comp-icon">✓</span>' : ''}
                    </div>
                    <div class="month-stats-row">
                        <span class="stat-count">${done}/${total}</span>
                        <span class="stat-pct">${pct}%</span>
                    </div>
                    <div class="mini-progress">
                        <div class="mini-fill" style="width: ${pct}%"></div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Update Global Stats
            document.getElementById('global-done').textContent = totalDone;
            document.getElementById('global-total').textContent = totalTasks;
            
            const globalPct = totalTasks === 0 ? 0 : Math.round((totalDone / totalTasks) * 100);
            document.getElementById('global-progress-label').textContent = globalPct + '%';
            document.getElementById('global-progress-fill').style.width = globalPct + '%';
        }

        function refreshPage() {
            const btn = document.querySelector('[onclick="refreshPage()"]');
            if (btn) {
                btn.classList.add('refresh-active');
                const icon = btn.querySelector('.nav-icon');
                if (icon) {
                    icon.style.transition = 'transform 0.55s ease';
                    icon.style.transform = 'rotate(360deg)';
                }
            }
            setTimeout(() => window.location.reload(), 450);
        }

        init();
    </script>
</body>
</html>
